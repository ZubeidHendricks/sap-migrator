name: sap-migrator
region: nyc

services:
- name: web
  github:
    repo: ZubeidHendricks/sap-migrator
    branch: main
    deploy_on_push: true
  dockerfile_path: Dockerfile
  http_port: 3000
  instance_size_slug: apps-s-1vcpu-0.5gb
  instance_count: 1
  health_check:
    http_path: /
    initial_delay_seconds: 60
    period_seconds: 15
    failure_threshold: 5
  envs:
  - key: DATABASE_URL
    value: "SET_IN_DO_DASHBOARD"
    type: SECRET
    scope: RUN_AND_BUILD_TIME
  - key: NEXTAUTH_URL
    value: "${APP_URL}"
    scope: RUN_AND_BUILD_TIME
  - key: NEXTAUTH_SECRET
    value: "SET_IN_DO_DASHBOARD"
    type: SECRET
    scope: RUN_AND_BUILD_TIME
  - key: NODE_ENV
    value: production
    scope: RUN_AND_BUILD_TIME
